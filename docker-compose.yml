services:
  postgres:
    image: postgres:16-alpine
    container_name: datashare-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dbuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dbpwd}
      POSTGRES_DB: ${DB_NAME:-datashare}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dbuser} -d ${DB_NAME:-datashare}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: